<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Untukmu ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Poppins:wght@300;400;600&display=swap');

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd1dc,#ffe4f2,#ffd6f6);
overflow:hidden;
height:100vh;
}

/* Sakura animation */

.sakura{
position:fixed;
top:-10px;
color:#ff8fb1;
font-size:20px;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

.font-cute{
font-family:'Gochi Hand',cursive;
}

#noBtn{
position:absolute;
transition:.3s;
}

</style>
</head>

<body class="flex items-center justify-center text-center">

<!-- MUSIC -->

<audio autoplay loop>
<source src="https://github.com/vunixx/vunixx.github.io/blob/main/asset1/Andmesh%20Kamaleng%20-%20Cinta%20Luar%20Biasa%20(Official%20Music%20Video).mp3">
</audio>

<!-- ENVELOPE -->

<div id="envelopeBox" class="cursor-pointer">

<div class="bg-white p-10 rounded-3xl shadow-2xl">
📩
<p class="text-xl mt-3">Klik surat ini</p>
</div>

</div>

<!-- MAIN QUESTION -->

<div id="mainBox" class="hidden bg-white/70 backdrop-blur-lg p-10 rounded-3xl shadow-2xl max-w-xl">

<img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYng2MDdpcWo5NGx0c204bG4zbnFsdjBmZTVld2VrNG5xd3BybDkydCZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/IzXiddo2twMmdmU8Lv/giphy.gif"
class="w-40 mx-auto mb-5 rounded-full">

<h1 class="text-4xl text-pink-600 font-cute mb-4">
Hai Tasya 🥺
</h1>

<p class="text-xl mb-6">
Aku sebenernya dari dulu suka sama kamu... kamu mau ga jadi pacarku?? yaa walopun tuaan kamoo ihh tapi aku cintaa sumpaaa... pliccc jadi my biniiii><
</p>

<p class="text-2xl font-semibold text-gray-800 mb-10">
Maukah kamu jadi pacarku? ❤️
</p>

<div class="flex justify-center gap-6 relative h-20">

<button id="yesBtn"
class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl text-lg shadow-lg">
IYA 💖
</button>

<button id="noBtn"
class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-xl text-lg shadow-lg"
style="left:55%">
NGGAK 😭
</button>

</div>

</div>

<!-- ENDING -->

<div id="endingBox" class="hidden fixed inset-0 flex items-center justify-center">

<div class="bg-white p-10 rounded-3xl shadow-2xl text-center">

<img src="https://media.giphy.com/media/9GimADhYmMB2ssdNf3/giphy.gif"
class="w-40 mx-auto mb-6 rounded-full">

<h1 class="text-5xl text-pink-500 font-cute mb-4">
YAYYYY ❤️
</h1>

<p class="text-2xl mb-4">
Aku seneng banget kamu nerima aku 🥺
</p>

<p class="text-gray-600">
Sekarang chat aku di WhatsApp ya 💌
</p>

</div>

</div>

<script>

/* open envelope */

const envelope=document.getElementById("envelopeBox")
const main=document.getElementById("mainBox")

envelope.onclick=()=>{
envelope.style.display="none"
main.style.display="block"
}

/* NO button escape */

const noBtn=document.getElementById("noBtn")
const yesBtn=document.getElementById("yesBtn")

let scale=1

const texts=[
"nggak 😭",
"yakin?",
"masa sih?",
"ayo dong",
"jangan gitu 🥺",
"plisss",
"aku sedih loh 😭"
]

let i=0

function moveButton(){

const w=window.innerWidth
const h=window.innerHeight

const x=Math.random()*(w-100)
const y=Math.random()*(h-100)

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"
noBtn.style.position="fixed"

scale+=0.15
yesBtn.style.transform=`scale(${scale})`

i=(i+1)%texts.length
noBtn.innerText=texts[i]

}

noBtn.addEventListener("mouseover",moveButton)
noBtn.addEventListener("click",moveButton)

/* YES button */

yesBtn.onclick=()=>{

document.getElementById("mainBox").style.display="none"
document.getElementById("endingBox").style.display="flex"

/* open whatsapp */

setTimeout(()=>{
window.open("https://wa.me/6289618530654?text=Aku%20mau%20kok%20❤️")
},3000)

}

/* sakura animation */

setInterval(()=>{

const sakura=document.createElement("div")
sakura.className="sakura"
sakura.innerHTML="🌸"

sakura.style.left=Math.random()*100+"vw"
sakura.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(sakura)

setTimeout(()=>sakura.remove(),10000)

},300)

</script>

</body>
</html>
