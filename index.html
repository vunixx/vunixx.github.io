<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="asset1/logo-id.png">
<title>Vunixx | Homepage</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at center, #1a0033, #05000a);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* Background particles effect */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(180,0,255,0.15) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-40px,-40px); }
}

.container {
  position: relative;
  padding: 40px;
  width: 400px;
  border-radius: 20px;
  background: rgba(20,0,40,0.4);
  border: 1px solid rgba(180,0,255,0.3);
  box-shadow:
    0 0 20px #8a00ff,
    inset 0 0 20px rgba(180,0,255,0.3);
  backdrop-filter: blur(15px);
  text-align: center;
}

/* Title neon */
.title {
  font-size: 2.5rem;
  margin-bottom: 20px;
  color: #e0aaff;
  text-shadow:
    0 0 10px #b000ff,
    0 0 30px #8000ff,
    0 0 60px #8000ff;
}

/* Subtitle */
.subtitle {
  margin-bottom: 30px;
  color: #ccc;
}

/* Button style */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  margin: 12px 0;
  padding: 15px;
  border-radius: 12px;
  color: white;
  font-weight: bold;
  background: linear-gradient(90deg, #6a00ff, #c000ff);
  box-shadow:
    0 0 10px #b000ff,
    0 0 25px rgba(176,0,255,0.7);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow:
    0 0 20px #d000ff,
    0 0 40px rgba(208,0,255,0.9);
}

/* Neon border animation */
.container::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 20px;
  background: linear-gradient(45deg, #8a00ff, transparent, #c000ff);
  z-index: -1;
  filter: blur(10px);
  opacity: 0.7;
}

</style>
</head>
<body>

<div class="container">
  <div class="title">VUNIXX</div>
  <div class="subtitle">Choose Your Language/Pilih Bahasa Mu</div>

  <a href="homepage-en.html" class="btn">🇺🇸 English Version</a>
  <a href="homepage-id.html" class="btn">🇮🇩 Versi Indonesia</a>
</div>

</body>
      <footer class="bg-black bg-opacity-80 text-purple-400 text-center py-6 font-semibold tracking-wide">
        Copyright © 2025 vunix All rights reserved.
    </footer>
</html>
